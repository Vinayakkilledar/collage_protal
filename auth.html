<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - EduPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Floating shapes for background -->
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        
        <div class="auth-box glass-panel">
            <div class="auth-header">
                <h2>EduPortal Access</h2>
                <p id="auth-subtitle">Welcome back! Please login to your account.</p>
            </div>
            
            <div class="auth-toggle">
                <button class="toggle-btn active" id="login-toggle">Login</button>
                <button class="toggle-btn" id="register-toggle">Register</button>
            </div>

            <div class="role-selector">
                <label>Select Role:</label>
                <div class="role-options">
                    <button class="role-btn active" data-role="student" type="button"><i class="fas fa-user-graduate"></i> Student</button>
                    <button class="role-btn" data-role="teacher" type="button"><i class="fas fa-chalkboard-teacher"></i> Teacher</button>
                    <button class="role-btn" data-role="office" type="button"><i class="fas fa-building"></i> Office</button>
                </div>
            </div>

            <!-- Forms Container -->
            <div class="forms-wrapper">
                
                <!-- LOGIN FORM -->
                <form id="login-form" class="auth-form active-form">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Password" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-submit">Login</button>
                </form>

                <!-- REGISTER FORM -->
                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Full Name" required>
                    </div>
                    <div class="input-group" id="dynamic-field">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="role-id-input" placeholder="USN/CSN Number" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="College Email Address" required>
                    </div>
                    
                    <!-- NEW FIELDS ONLY FOR STUDENT -->
                    <div id="student-only-fields" style="display: block;">
                        <div class="input-group">
                            <i class="fas fa-mobile-alt"></i>
                            <input type="text" id="student-mobile" placeholder="Mobile Number">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="text" id="parent-mobile" placeholder="Parent's Mobile Number">
                        </div>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-pass" placeholder="Create Password" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-conf-pass" placeholder="Confirm Password" required>
                    </div>
                    <button type="submit" class="btn-submit">Create Account</button>
                </form>
            </div>
            
            <div class="back-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
