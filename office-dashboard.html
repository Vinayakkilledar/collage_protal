<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Office Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <div class="logo">Office Portal</div>
        <button onclick="logout()" class="btn-primary">Logout</button>
    </nav>
    <main class="dashboard-container" style="padding: 2rem 5%; text-align: center;">
        <h2 style="margin-bottom: 2rem;">Manage Students</h2>
        <div id="students-list" style="max-width: 800px; margin: 0 auto;"></div>
    </main>
    <script>
        const token = localStorage.getItem('token');
        if(!token || localStorage.getItem('role') !== 'office') window.location.href = 'auth.html';
        
        async function fetchStudents() {
            const res = await fetch('/api/office/students', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const container = document.getElementById('students-list');
            
            if (data.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; font-size: 1.1rem;">No students have registered yet.</p>';
                return;
            }
            
            container.innerHTML = data.map(s => `
                <div class="glass-card" style="margin-bottom: 2rem; text-align: left; padding: 2rem;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px;">
                        <div>
                            <h3 style="font-size: 1.5rem; color: #fff;">${s.name} <span style="font-size:0.8em; color:#94a3b8;">(${s.usn || s.email})</span></h3>
                        </div>
                        <div style="text-align: right; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                            <p style="color: #ef4444; font-weight: 600; margin-bottom: 5px;">Total Backlogs: ${s.academic?.backlogs || 0}</p>
                            <p style="color: #f59e0b; font-weight: 600;">Live Backlogs: ${s.academic?.activeBacklogs || 0}</p>
                        </div>
                    </div>
                    
                    <hr style="border-color: rgba(255,255,255,0.1); margin-bottom: 1.5rem;">
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                        <div>
                            <label style="display:block; margin-bottom: 5px; font-size:0.9rem; color:#a5b4fc;">Semester</label>
                            <select id="sem-${s._id}" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(15,23,42,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;">
                                <option value="" ${!s.academic?.sem ? 'selected' : ''}>Select Sem</option>
                                ${[1,2,3,4,5,6,7,8].map(val => `<option value="${val}" ${s.academic?.sem == val ? 'selected' : ''}>Sem ${val}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label style="display:block; margin-bottom: 5px; font-size:0.9rem; color:#a5b4fc;">Divide Section</label>
                            <select id="sec-${s._id}" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(15,23,42,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;">
                                <option value="" ${!s.academic?.section ? 'selected' : ''}>Select Div</option>
                                <option value="A" ${s.academic?.section == 'A' ? 'selected' : ''}>Section A</option>
                                <option value="B" ${s.academic?.section == 'B' ? 'selected' : ''}>Section B</option>
                                <option value="C" ${s.academic?.section == 'C' ? 'selected' : ''}>Section C</option>
                            </select>
                        </div>
                        <div style="grid-column: 1 / -1;">
                            <label style="display:block; margin-bottom: 5px; font-size:0.9rem; color:#a5b4fc;">Selected Subjects (comma separated)</label>
                            <input type="text" id="sub-${s._id}" placeholder="e.g., Mathematics, Physics, Chemistry" value="${(s.academic?.subjects || []).join(', ')}" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(15,23,42,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom: 5px; font-size:0.9rem; color:#a5b4fc;">Total Backlogs</label>
                            <input type="number" id="bl-${s._id}" value="${s.academic?.backlogs || 0}" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(15,23,42,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom: 5px; font-size:0.9rem; color:#a5b4fc;">Live Backlogs</label>
                            <input type="number" id="lbl-${s._id}" value="${s.academic?.activeBacklogs || 0}" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(15,23,42,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;">
                        </div>
                        <div style="grid-column: 1 / -1; display: flex; justify-content: flex-end; margin-top: 10px;">
                            <button onclick="updateStudent('${s._id}')" class="btn-primary" style="padding: 0.8rem 2rem; font-size: 1rem;">Save Student Details</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateStudent(id) {
            const sem = document.getElementById(`sem-${id}`).value;
            const section = document.getElementById(`sec-${id}`).value;
            const subjects = document.getElementById(`sub-${id}`).value;
            const backlogs = document.getElementById(`bl-${id}`).value;
            const activeBacklogs = document.getElementById(`lbl-${id}`).value;
            
            await fetch(`/api/office/students/${id}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ sem, section, subjects, backlogs, activeBacklogs })
            });
            alert('Student details updated successfully!');
            fetchStudents();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        fetchStudents();
    </script>
</body>
</html>
