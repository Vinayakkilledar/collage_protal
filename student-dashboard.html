<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .subject-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .subject-card:hover { border-color: #6366f1; transform: translateY(-3px); }
        .subject-details {
            display: none;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            margin-top: -1rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: none;
        }
        .mat-item {
            padding: 10px; border-radius: 5px; background: rgba(255,255,255,0.05); margin-bottom: 5px;
        }
    </style>
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <div class="logo">Student Portal</div>
        <button onclick="logout()" class="btn-primary">Logout</button>
    </nav>
    <main class="dashboard-container" style="padding: 2rem 5%; max-width: 900px; margin: 0 auto;">
        
        <!-- INITIAL SEM SELECTION -->
        <div id="sem-selection-ui" class="glass-card" style="text-align: center; padding: 3rem; margin-top: 2rem;">
            <h2>Welcome! Please Select Your Semester</h2>
            <p style="color: #94a3b8; margin: 1rem 0 2rem;">You must select the exact semester assigned to you by the Office Administration.</p>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <select id="user-sem" style="padding: 1rem; border-radius: 8px; font-size: 1rem; background: rgba(15,23,42,0.8); color: white; border: 1px solid rgba(255,255,255,0.2);">
                    <option value="">-- Choose Sem --</option>
                    <option value="1">Semester 1</option><option value="2">Semester 2</option>
                    <option value="3">Semester 3</option><option value="4">Semester 4</option>
                    <option value="5">Semester 5</option><option value="6">Semester 6</option>
                    <option value="7">Semester 7</option><option value="8">Semester 8</option>
                </select>
                <button onclick="accessDashboard()" class="btn-primary" style="padding: 1rem 2rem; font-size: 1rem;">Enter</button>
            </div>
            <p id="sem-error" style="color: #ef4444; margin-top: 1rem; font-weight: 600;"></p>
        </div>

        <!-- MAIN DASHBOARD (HIDDEN INITIALLY) -->
        <div id="dashboard-content" style="display: none;">
            <div class="glass-card" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; padding: 2rem;">
                <div id="student-header"></div>
                <div id="student-backlogs" style="text-align: right; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;"></div>
            </div>

            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">Enrolled Subjects</h3>
            <p style="color: #94a3b8; margin-bottom: 1.5rem;">Click on any subject to view Notes, Assignments, Feedback, and Attendance records.</p>
            
            <div id="subjects-container">
                <!-- Subject Cards populated dynamically -->
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if(!token || localStorage.getItem('role') !== 'student') window.location.href = 'auth.html';
        
        async function accessDashboard() {
            const sem = document.getElementById('user-sem').value;
            const errEl = document.getElementById('sem-error');
            if(!sem) { errEl.innerText = "Please select a semester."; return; }

            try {
                const res = await fetch(`/api/student/dashboard?sem=${sem}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if(!res.ok) {
                    errEl.innerText = data.message;
                    return;
                }

                // SUCCESS
                document.getElementById('sem-selection-ui').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';

                const p = data.profile;
                
                // Populate Headers
                document.getElementById('student-header').innerHTML = `
                    <h2 style="font-size: 2rem; margin-bottom: 5px;">${p.user.name}</h2>
                    <p style="color: #a5b4fc;">USN/CSN: <strong style="color: white;">${p.user.usn || p.user.email}</strong></p>
                    <p style="color: #ccc;">Sem: ${p.sem} | Section: ${p.section}</p>
                `;
                document.getElementById('student-backlogs').innerHTML = `
                    <p style="color: #ef4444; font-weight: 600; margin-bottom: 5px;">Total Backlogs: ${data.backlogs || 0}</p>
                    <p style="color: #f59e0b; font-weight: 600;">Live Backlogs: ${data.activeBacklogs || 0}</p>
                `;

                // Populate Subjects
                const container = document.getElementById('subjects-container');
                if(!p.subjects || p.subjects.length === 0) {
                    container.innerHTML = '<p>No subjects assigned yet.</p>';
                    return;
                }

                let html = '';
                p.subjects.forEach(sub => {
                    const safeId = sub.replace(/\s+/g, '-').toLowerCase();
                    
                    // Stats
                    const att = data.attendanceStats[sub];
                    const attText = att ? `${att.percentage}% (${att.present}/${att.total})` : 'No Records';
                    
                    // Materials
                    const mats = (data.materials || []).filter(m => m.subject === sub);
                    let matsHtml = mats.length === 0 ? '<p style="color:#64748b;">No materials uploaded.</p>' : '';
                    mats.forEach(m => {
                        let linkHtml = '';
                        if(m.content && m.content.startsWith('/uploads')) {
                            linkHtml = `<a href="${m.content}" target="_blank" style="color: #6366f1; text-decoration: underline; font-weight: 600;"><i class="fas fa-file-pdf"></i> Download PDF</a>`;
                        } else {
                            linkHtml = `<span style="color: #cbd5e1;">${m.content || 'No file attached'}</span>`;
                        }

                        matsHtml += `<div class="mat-item">
                            <strong style="color: #a5b4fc;">[${m.type}]</strong> ${m.title}
                            <p style="font-size: 0.9em; color: #cbd5e1; margin-top:5px;">${linkHtml}</p>
                        </div>`;
                    });

                    html += `
                        <div class="subject-card" onclick="toggleDetails('${safeId}')">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h4 style="font-size: 1.3rem;">${sub}</h4>
                                <span style="font-size: 0.9rem; color: #a5b4fc;">Click to Expand ▼</span>
                            </div>
                        </div>
                        <div id="details-${safeId}" class="subject-details">
                            <div style="margin-bottom: 1.5rem;">
                                <h5 style="color: #a5b4fc; margin-bottom: 5px; font-size: 1rem;">Attendance percentage</h5>
                                <p style="font-size: 1.2rem; font-weight: bold;">${attText}</p>
                            </div>
                            <div>
                                <h5 style="color: #a5b4fc; margin-bottom: 10px; font-size: 1rem;">Notes, Assignments & Feedback</h5>
                                ${matsHtml}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch(e) {
                console.error(e);
                errEl.innerText = "Network error connecting to the server.";
            }
        }

        function toggleDetails(id) {
            const el = document.getElementById(`details-${id}`);
            if(el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
